# fly.toml app configuration file generated for s-ashwat on 2026-06-09T00:39:47+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 's-ashwat'
primary_region = 'sin'

[build]
  [build.args]
    NEXT_PUBLIC_AIRWAVE_URL = "https://airwave.s-ashwath.com"

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
